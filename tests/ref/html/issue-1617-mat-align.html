<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mrow>
        <mo>(</mo>
        <mtable>
          <mtr>
            <mtd>
              <mi>𝑎</mi>
            </mtd>
            <mtd>
              <mi>𝑏</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>𝑐</mi>
            </mtd>
            <mtd>
              <mi>𝑑</mi>
            </mtd>
          </mtr>
        </mtable>
        <mo>)</mo>
      </mrow>
      <mrow>
        <mo>(</mo>
        <mtable>
          <mtr>
            <mtd>
              <mi>𝑥</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>𝑦</mi>
            </mtd>
          </mtr>
        </mtable>
        <mo>)</mo>
      </mrow>
    </math>
    <math display="block">
      <mi>𝑥</mi>
      <mrow>
        <mo>(</mo>
        <mtable>
          <mtr>
            <mtd>
              <mi>𝑎</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>𝑐</mi>
            </mtd>
          </mtr>
        </mtable>
        <mo>)</mo>
      </mrow>
      <mo>+</mo>
      <mi>𝑦</mi>
      <mrow>
        <mo>(</mo>
        <mtable>
          <mtr>
            <mtd>
              <mi>𝑏</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>𝑑</mi>
            </mtd>
          </mtr>
        </mtable>
        <mo>)</mo>
      </mrow>
      <mo>=</mo>
      <mrow>
        <mo>(</mo>
        <mtable>
          <mtr>
            <mtd>
              <mi>𝑎</mi>
              <mi>𝑥</mi>
              <mo>+</mo>
              <mi>𝑏</mi>
              <mi>𝑦</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>𝑐</mi>
              <mi>𝑥</mi>
              <mo>+</mo>
              <mi>𝑑</mi>
              <mi>𝑦</mi>
            </mtd>
          </mtr>
        </mtable>
        <mo>)</mo>
      </mrow>
    </math>
    <math display="block">
      <mrow>
        <mo>(</mo>
        <mtable>
          <mtr>
            <mtd>
              <mo>−</mo>
              <msub>
                <mi>𝑑</mi>
                <mn>0</mn>
              </msub>
            </mtd>
            <mtd>
              <msub>
                <mi>𝜆</mi>
                <mn>0</mn>
              </msub>
            </mtd>
            <mtd>
              <mn>0</mn>
            </mtd>
            <mtd>
              <mn>0</mn>
            </mtd>
            <mtd>
              <mi>…</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <msub>
                <mi>𝜇</mi>
                <mn>1</mn>
              </msub>
            </mtd>
            <mtd>
              <mo>−</mo>
              <msub>
                <mi>𝑑</mi>
                <mn>1</mn>
              </msub>
            </mtd>
            <mtd>
              <msub>
                <mi>𝜆</mi>
                <mn>1</mn>
              </msub>
            </mtd>
            <mtd>
              <mn>0</mn>
            </mtd>
            <mtd>
              <mi>…</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mn>0</mn>
            </mtd>
            <mtd>
              <msub>
                <mi>𝜇</mi>
                <mn>2</mn>
              </msub>
            </mtd>
            <mtd>
              <mo>−</mo>
              <msub>
                <mi>𝑑</mi>
                <mn>2</mn>
              </msub>
            </mtd>
            <mtd>
              <msub>
                <mi>𝜆</mi>
                <mn>2</mn>
              </msub>
            </mtd>
            <mtd>
              <mi>…</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>⋮</mi>
            </mtd>
            <mtd>
              <mi>⋮</mi>
            </mtd>
            <mtd>
              <mi>⋮</mi>
            </mtd>
            <mtd>
              <mi>⋮</mi>
            </mtd>
            <mtd>
              <mi>⋱</mi>
            </mtd>
          </mtr>
        </mtable>
        <mo>)</mo>
      </mrow>
      <mrow>
        <mo>(</mo>
        <mtable>
          <mtr>
            <mtd>
              <msub>
                <mi>𝑝</mi>
                <mn>0</mn>
              </msub>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <msub>
                <mi>𝑝</mi>
                <mn>1</mn>
              </msub>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <msub>
                <mi>𝑝</mi>
                <mn>2</mn>
              </msub>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>⋮</mi>
            </mtd>
          </mtr>
        </mtable>
        <mo>)</mo>
      </mrow>
    </math>
  </body>
</html>
