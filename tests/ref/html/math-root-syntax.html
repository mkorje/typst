<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <msqrt>
        <msup>
          <mn>2</mn>
          <mn>3</mn>
        </msup>
      </msqrt>
      <mo>=</mo>
      <msqrt>
        <msup>
          <mn>2</mn>
          <mn>3</mn>
        </msup>
      </msqrt>
    </math>
    <math display="block">
      <msqrt>
        <mi>𝑥</mi>
        <mo>+</mo>
        <mi>𝑦</mi>
      </msqrt>
      <mspace width="1em"/>
      <mroot>
        <mi>𝑥</mi>
        <mn>3</mn>
      </mroot>
      <mspace width="1em"/>
      <mroot>
        <mi>𝑥</mi>
        <mn>4</mn>
      </mroot>
    </math>
    <math display="block">
      <mrow>
        <mo>(</mo>
        <mrow>
          <msqrt>
            <mn>2</mn>
          </msqrt>
          <mo>+</mo>
          <mn>3</mn>
        </mrow>
        <mo>)</mo>
      </mrow>
      <mo>=</mo>
      <mrow>
        <mo>(</mo>
        <mrow>
          <msqrt>
            <mn>2</mn>
          </msqrt>
          <mo>+</mo>
          <mn>3</mn>
        </mrow>
        <mo>)</mo>
      </mrow>
    </math>
  </body>
</html>
