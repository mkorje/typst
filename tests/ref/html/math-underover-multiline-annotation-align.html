<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mi>𝑥</mi>
      <mo>=</mo>
      <munder>
        <munder accentunder="true">
          <mtext>complexity</mtext>
          <mo>⏟</mo>
        </munder>
        <munder>
          <munder accentunder="true">
            <mtable class="multiline-equation aligned-equation">
              <mtr>
                <mtd></mtd>
                <mtd>
                  <mn>1</mn>
                  <mo lspace="0em" rspace="0em">+</mo>
                  <mn>2</mn>
                </mtd>
              </mtr>
              <mtr>
                <mtd>
                  <mn>3</mn>
                  <mo form="infix" lspace="0em" rspace="0em">+</mo>
                </mtd>
                <mtd>
                  <mn>4</mn>
                </mtd>
              </mtr>
            </mtable>
            <mo>⏟</mo>
          </munder>
          <mtable class="multiline-equation aligned-equation">
            <mtr>
              <mtd>
                <mi>𝑎</mi>
                <mi>𝑏</mi>
                <mo form="infix" lspace="0em" rspace="0em">+</mo>
              </mtd>
              <mtd>
                <mi>𝑐</mi>
              </mtd>
            </mtr>
            <mtr>
              <mtd>
                <mi>𝑑</mi>
                <mo form="infix" lspace="0em" rspace="0em">+</mo>
              </mtd>
              <mtd>
                <mi>𝑒</mi>
              </mtd>
            </mtr>
          </mtable>
        </munder>
      </munder>
    </math>
  </body>
</html>
