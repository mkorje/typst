<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><mtable class="multiline-equation"><mtr><mtd><mi>𝛂</mi><mo>=</mo><mi>𝛂</mi></mtd></mtr><mtr><mtd><mi>𝟋</mi><mo>=</mo><mi>𝟋</mi></mtd></mtr><mtr><mtd><mi>𝝝</mi><mo>=</mo><mi>𝝝</mi></mtd></mtr><mtr><mtd><mi>ħ</mi><mo>≠</mo><mi>ℏ</mi></mtd></mtr><mtr><mtd><mi>𝕖</mi><mo>≠</mo><mi>ⅇ</mi></mtd></mtr><mtr><mtd><mi>𝘈</mi><mo>≠</mo><mi>𝐴</mi></mtd></mtr></mtable></math></p>
  </body>
</html>
