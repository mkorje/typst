<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation">
        <mtr>
          <mtd>
            <mo form="infix" lspace="0em" rspace="0em" minsize="4em">→</mo>
            <mo lspace="0em" rspace="0em">≫</mo>
            <munder>
              <mo form="infix" lspace="0em" rspace="0em" minsize="4em">→</mo>
              <mi>𝐴</mi>
            </munder>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mo form="infix" lspace="0em" rspace="0em" minsize="0pt">→</mo>
            <mo lspace="0em" rspace="0em">=</mo>
            <munder>
              <mo form="infix" lspace="0em" rspace="0em" minsize="0pt">→</mo>
              <mi>𝐴</mi>
            </munder>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mo form="infix" lspace="0em" rspace="0em" minsize="500%">→</mo>
            <mo lspace="0em" rspace="0em">⋙</mo>
            <munder>
              <mo form="infix" lspace="0em" rspace="0em" minsize="500%">→</mo>
              <mi>𝐴</mi>
            </munder>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mo form="infix" lspace="0em" rspace="0em" minsize="250%">→</mo>
            <mo lspace="0em" rspace="0em">></mo>
            <munder>
              <mo form="infix" lspace="0em" rspace="0em" minsize="250%">→</mo>
              <mi>𝐴</mi>
            </munder>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mo form="infix" lspace="0em" rspace="0em" minsize="2em">→</mo>
            <mo lspace="0em" rspace="0em">></mo>
            <munder>
              <mo form="infix" lspace="0em" rspace="0em" minsize="2em">→</mo>
              <mtext>blah</mtext>
            </munder>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
