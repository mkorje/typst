<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation">
        <mtr>
          <mtd>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo lspace="0em" rspace="0em">̀</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑏</mi>
              <mo lspace="0em" rspace="0em">́</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑓</mi>
              <mo>̂</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>§</mi>
              <mo lspace="0em" rspace="0em">̃</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>ä</mi>
              <mo lspace="0em" rspace="0em">̄</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>ä</mi>
              <mo lspace="0em" rspace="0em">̅</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>ä</mi>
              <mo lspace="0em" rspace="0em">̆</mo>
            </mover>
            <mo rspace="0em">,</mo>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mover accent="true">
              <mi>!</mi>
              <mo lspace="0em" rspace="0em">̇</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo lspace="0em" rspace="0em">̈</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo lspace="0em" rspace="0em">̈</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo>⃛</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo>⃜</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo lspace="0em" rspace="0em">̊</mo>
            </mover>
            <mo rspace="0em">,</mo>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo lspace="0em" rspace="0em">̋</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>@</mi>
              <mo lspace="0em" rspace="0em">̌</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑍</mi>
              <mo lspace="0em" rspace="0em" stretchy="true">⃗</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑍</mi>
              <mo lspace="0em" rspace="0em" stretchy="true">⃖</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑍</mi>
              <mo lspace="0em" rspace="0em" stretchy="true">⃡</mo>
            </mover>
            <mo rspace="0em">,</mo>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo lspace="0em" rspace="0em" stretchy="true">⃑</mo>
            </mover>
            <mo>,</mo>
            <mover accent="true">
              <mi>𝑎</mi>
              <mo lspace="0em" rspace="0em" stretchy="true">⃐</mo>
            </mover>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
