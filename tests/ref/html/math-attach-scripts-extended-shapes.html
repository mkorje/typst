<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><msubsup><mrow><mo minsize="240%">[</mo><mi>𝑥</mi><mo minsize="240%">]</mo></mrow><mn>0</mn><mn>1</mn></msubsup><mo>,</mo><msubsup><mrow><mo>[</mo><mi>𝑥</mi><mo>]</mo></mrow><mn>0</mn><mn>1</mn></msubsup><mo>,</mo><msubsup><mo form="postfix" stretchy="false">]</mo><mn>0</mn><mn>1</mn></msubsup><mo>,</mo><msubsup><mi>𝑥</mi><mn>0</mn><mn>1</mn></msubsup><mo>,</mo><msubsup><mi>𝐴</mi><mn>0</mn><mn>1</mn></msubsup></math><br><math><msup><mi>𝑛</mi><mn>2</mn></msup><mo>,</mo><msup><mrow><mo>(</mo><mrow><mi>𝑛</mi><mo>+</mo><mn>1</mn></mrow><mo>)</mo></mrow><mn>2</mn></msup><mo>,</mo><msubsup><mo form="prefix" lspace="0em" rspace="0em">∑</mo><mn>0</mn><mn>1</mn></msubsup><mo>,</mo><msubsup><mo form="prefix" lspace="0em" rspace="0em">∫</mo><mn>0</mn><mn>1</mn></msubsup></math></p>
  </body>
</html>
