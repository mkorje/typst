<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mfrac>
        <mn>1</mn>
        <msup>
          <mi>𝑉</mi>
          <msup>
            <mn>2</mn>
            <msup>
              <mn>3</mn>
              <msup>
                <mn>4</mn>
                <mn>5</mn>
              </msup>
            </msup>
          </msup>
        </msup>
      </mfrac>
      <mo>,</mo>
      <mfrac>
        <munder>
          <msub>
            <mi>𝑉</mi>
            <msub>
              <mn>2</mn>
              <mn>3</mn>
            </msub>
          </msub>
          <munder>
            <mn>2</mn>
            <mn>3</mn>
          </munder>
        </munder>
        <mover>
          <mmultiscripts>
            <mi>𝑉</mi>
            <mrow></mrow>
            <mrow></mrow>
            <mprescripts/>
            <mrow></mrow>
            <mmultiscripts>
              <mn>2</mn>
              <mrow></mrow>
              <mrow></mrow>
              <mprescripts/>
              <mrow></mrow>
              <mn>3</mn>
            </mmultiscripts>
          </mmultiscripts>
          <mover>
            <mn>2</mn>
            <mn>3</mn>
          </mover>
        </mover>
      </mfrac>
      <mo>,</mo>
      <mmultiscripts>
        <mi mathvariant="normal">Ω</mi>
        <msub>
          <mn>2</mn>
          <msub>
            <mn>3</mn>
            <msub>
              <mn>4</mn>
              <mn>5</mn>
            </msub>
          </msub>
        </msub>
        <msup>
          <mn>2</mn>
          <msup>
            <mn>3</mn>
            <msup>
              <mn>4</mn>
              <mn>5</mn>
            </msup>
          </msup>
        </msup>
        <mprescripts/>
        <mmultiscripts>
          <mn>2</mn>
          <mrow></mrow>
          <mrow></mrow>
          <mprescripts/>
          <mmultiscripts>
            <mn>3</mn>
            <mrow></mrow>
            <mrow></mrow>
            <mprescripts/>
            <mmultiscripts>
              <mn>4</mn>
              <mrow></mrow>
              <mrow></mrow>
              <mprescripts/>
              <mn>5</mn>
              <mrow></mrow>
            </mmultiscripts>
            <mrow></mrow>
          </mmultiscripts>
          <mrow></mrow>
        </mmultiscripts>
        <mmultiscripts>
          <mn>2</mn>
          <mrow></mrow>
          <mrow></mrow>
          <mprescripts/>
          <mrow></mrow>
          <mmultiscripts>
            <mn>3</mn>
            <mrow></mrow>
            <mrow></mrow>
            <mprescripts/>
            <mrow></mrow>
            <mmultiscripts>
              <mn>4</mn>
              <mrow></mrow>
              <mrow></mrow>
              <mprescripts/>
              <mrow></mrow>
              <mn>5</mn>
            </mmultiscripts>
          </mmultiscripts>
        </mmultiscripts>
      </mmultiscripts>
    </math>
  </body>
</html>
