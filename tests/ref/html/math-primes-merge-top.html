<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation aligned-equation">
        <mtr>
          <mtd>
            <msup>
              <mi>𝑎</mi>
              <mrow>
                <mi>′</mi>
                <mi>𝑏</mi>
              </mrow>
            </msup>
          </mtd>
          <mtd>
            <mspace width="1em"/>
            <msup>
              <mi>𝑎</mi>
              <mrow>
                <mi>′</mi>
                <mi>𝑏</mi>
              </mrow>
            </msup>
          </mtd>
          <mtd>
            <mspace width="1em"/>
            <msup>
              <msup>
                <mi>𝑎</mi>
                <mi>𝑏</mi>
              </msup>
              <mi>′</mi>
            </msup>
          </mtd>
          <mtd>
            <mspace width="1em"/>
            <msup>
              <mmultiscripts>
                <mi>𝑎</mi>
                <mrow></mrow>
                <mi>𝑏</mi>
                <mprescripts/>
                <mrow></mrow>
                <mi>′</mi>
              </mmultiscripts>
              <mi>′</mi>
            </msup>
          </mtd>
          <mtd>
            <mspace width="1em"/>
            <msup>
              <msup>
                <mi>𝑎</mi>
                <mrow>
                  <mi>′</mi>
                  <mi>𝑏</mi>
                </mrow>
              </msup>
              <mi>′</mi>
            </msup>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mover>
              <msup>
                <mo form="prefix" lspace="0em" rspace="0em">∏</mo>
                <mi>′</mi>
              </msup>
              <mi>𝑏</mi>
            </mover>
          </mtd>
          <mtd>
            <mspace width="1em"/>
            <mover>
              <msup>
                <mo form="prefix" lspace="0em" rspace="0em">∏</mo>
                <mi>′</mi>
              </msup>
              <mi>𝑏</mi>
            </mover>
          </mtd>
          <mtd>
            <mspace width="1em"/>
            <mover>
              <msup>
                <mo form="prefix" lspace="0em" rspace="0em">∏</mo>
                <mi>′</mi>
              </msup>
              <mi>𝑏</mi>
            </mover>
          </mtd>
          <mtd>
            <mspace width="1em"/>
            <mover>
              <mmultiscripts>
                <mo form="prefix" lspace="0em" rspace="0em">∏</mo>
                <mrow></mrow>
                <mi>′</mi>
                <mprescripts/>
                <mrow></mrow>
                <mi>′</mi>
              </mmultiscripts>
              <mi>𝑏</mi>
            </mover>
          </mtd>
          <mtd>
            <mspace width="1em"/>
            <msup>
              <mover>
                <msup>
                  <mo form="prefix" lspace="0em" rspace="0em">∏</mo>
                  <mi>′</mi>
                </msup>
                <mi>𝑏</mi>
              </mover>
              <mi>′</mi>
            </msup>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
