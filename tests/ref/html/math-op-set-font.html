<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><mo lspace="0em" rspace="0em">sech</mo><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><msub><mo form="prefix" lspace="0.16666666666666666em" rspace="0.16666666666666666em">mod</mo><mrow><mi>𝑥</mi><mo lspace="0em" rspace="0em" stretchy="false">→</mo><mi>∞</mi></mrow></msub><msub><mo form="prefix" lspace="0em" rspace="0em">fi</mo><mn>1</mn></msub><mrow><mo>(</mo><mi>𝑋</mi><mo>)</mo></mrow></math> <math><mo lspace="0em" rspace="0em">sech</mo><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><msub><mo form="prefix" lspace="0.16666666666666666em" rspace="0.16666666666666666em">mod</mo><mrow><mi>𝑥</mi><mo lspace="0em" rspace="0em" stretchy="false">→</mo><mi>∞</mi></mrow></msub><msub><mo form="prefix" lspace="0em" rspace="0em">fi</mo><mn>1</mn></msub><mrow><mo>(</mo><mi>𝑋</mi><mo>)</mo></mrow></math></p>
  </body>
</html>
