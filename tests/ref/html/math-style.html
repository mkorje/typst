<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><mtable class="multiline-equation"><mtr><mtd><mi>𝐴</mi><mo>,</mo><mi>𝐴</mi><mo>,</mo><mi mathvariant="normal">A</mi><mo>,</mo><mi>𝑨</mi><mo>,</mo><mi>𝐀</mi><mo rspace="0em">,</mo></mtd></mtr><mtr><mtd><mi>𝐴</mi><mo>,</mo><mi>𝘈</mi><mo>,</mo><mi>𝒜︀</mi><mo>,</mo><mi>𝔄</mi><mo>,</mo><mi>𝙰</mi><mo>,</mo><mi>𝔸</mi><mo rspace="0em">,</mo></mtd></mtr><mtr><mtd><mi>𝜕</mi><mo>,</mo><mi mathvariant="normal">∂</mi><mo rspace="0em">,</mo></mtd></mtr><mtr><mtd><mtext>𝕙𝕖𝕝𝕝𝕠</mtext><mo>+</mo><mtext>𝔀︀𝓸︀𝓻︀𝓵︀𝓭︀</mtext><mo rspace="0em">,</mo></mtd></mtr><mtr><mtd><mtext>𝚂𝚀𝚁𝚃</mtext><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><mo lspace="0.2222222222222222em" rspace="0.2222222222222222em">≀</mo><mn>𝟷𝟸𝟹</mn><mo>+</mo><mn>𝟺𝟻𝟼</mn></mtd></mtr></mtable></math></p>
  </body>
</html>
