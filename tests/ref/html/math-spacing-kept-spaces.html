<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><mi>𝑓</mi><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><mo>,</mo><mi>𝑓</mi><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow></math><br><math><mrow><mo>[</mo><mrow><mi>𝑎</mi><mo lspace="0em" rspace="0em">|</mo><mi>𝑏</mi></mrow><mo>]</mo></mrow><mo>,</mo><mrow><mo>[</mo><mrow><mi>𝑎</mi><mspace width="0.2222222222222222em"/><mo lspace="0em" rspace="0em">|</mo><mspace width="0.2222222222222222em"/><mi>𝑏</mi></mrow><mo>]</mo></mrow></math><br><math><mi>𝑎</mi><mtext>is</mtext><mi>𝑏</mi><mo>,</mo><mi>𝑎</mi><mspace width="0.2222222222222222em"/><mtext>is</mtext><mspace width="0.2222222222222222em"/><mi>𝑏</mi></math><br><math><mi>𝐴</mi><mtext>B</mtext><mi>𝐶</mi><mo>,</mo><mi>𝐴</mi><mspace width="0.2222222222222222em"/><mtext>B</mtext><mspace width="0.2222222222222222em"/><mi>𝐶</mi></math></p>
  </body>
</html>
