<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><mtable class="multiline-equation"><mtr><mtd><mfrac><mi>𝑎</mi><mi>𝑏</mi></mfrac><mo>,</mo><mfrac displaystyle="true"><mi>𝑎</mi><mi>𝑏</mi></mfrac><mo>,</mo><mfrac><mi scriptlevel="0" displaystyle="true">𝑎</mi><mi scriptlevel="0" displaystyle="true" style="math-shift: normal">𝑏</mi></mfrac><mo>,</mo><mfrac><mi>𝑎</mi><mi>𝑏</mi></mfrac><mo>,</mo><mfrac scriptlevel="1" style="math-shift: compact"><mi>𝑎</mi><mi>𝑏</mi></mfrac><mo>,</mo><mfrac scriptlevel="2" style="math-shift: compact"><mi>𝑎</mi><mi>𝑏</mi></mfrac></mtd></mtr><mtr><mtd><mfrac scriptlevel="1" style="math-shift: compact"><mi>𝚊</mi><mi>𝚋</mi></mfrac><mo>,</mo><mfrac scriptlevel="1" style="math-shift: compact"><mi>𝚊</mi><mi>𝚋</mi></mfrac></mtd></mtr><mtr><mtd><msup scriptlevel="1" style="math-shift: compact"><mi>𝑎</mi><mi>𝑏</mi></msup><mo>,</mo><msup scriptlevel="1"><mi>𝑎</mi><mi>𝑏</mi></msup></mtd></mtr></mtable></math></p>
  </body>
</html>
