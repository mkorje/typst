<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <munder>
        <mo lspace="0em">∑</mo>
        <mrow>
          <mi>𝑝</mi>
          <mspace width="0.2222222222222222em"/>
          <mtext>prime</mtext>
        </mrow>
      </munder>
      <mi>𝑓</mi>
      <mrow>
        <mo>(</mo>
        <mi>𝑝</mi>
        <mo>)</mo>
      </mrow>
      <mo>=</mo>
      <msub>
        <mo form="prefix" lspace="0em">∫</mo>
        <mrow>
          <mi>𝑡</mi>
          <mo lspace="0em" rspace="0em">></mo>
          <mn>1</mn>
        </mrow>
      </msub>
      <mi>𝑓</mi>
      <mrow>
        <mo>(</mo>
        <mi>𝑡</mi>
        <mo>)</mo>
      </mrow>
      <mspace width="0.16666666666666666em"/>
      <mo form="prefix" lspace="0em" rspace="0em">d</mo>
      <mi>𝜋</mi>
      <mrow>
        <mo>(</mo>
        <mi>𝑡</mi>
        <mo>)</mo>
      </mrow>
    </math>
  </body>
</html>
