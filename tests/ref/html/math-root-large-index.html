<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mroot>
        <mi>𝑥</mi>
        <mn>2</mn>
      </mroot>
      <mspace width="1em"/>
      <mroot>
        <mi>𝑥</mi>
        <mfrac>
          <mn>3</mn>
          <mfrac>
            <mn>2</mn>
            <mn>1</mn>
          </mfrac>
        </mfrac>
      </mroot>
      <mspace width="1em"/>
      <mroot>
        <mi>𝑥</mi>
        <mfrac>
          <mn>1</mn>
          <mn>11</mn>
        </mfrac>
      </mroot>
      <mspace width="1em"/>
      <mroot>
        <mn>1</mn>
        <mfrac>
          <mfrac>
            <mn>1</mn>
            <mn>2</mn>
          </mfrac>
          <mn>3</mn>
        </mfrac>
      </mroot>
    </math>
  </body>
</html>
