<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><mtable class="multiline-equation"><mtr><mtd><msub><mi>𝜋</mi><mn>1</mn></msub><mrow><mo>(</mo><mi>𝑌</mi><mo>)</mo></mrow><mo>,</mo><msub><mi>𝑎</mi><mrow><mi>𝑓</mi><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow></mrow></msub><mo>,</mo><msup><mi>𝑎</mi><mi>𝜁</mi></msup><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><mo>,</mo><msubsup><mi>𝑎</mi><msqrt><mi>𝑐</mi></msqrt><mrow><mo>|</mo><mi>𝑏</mi><mo>|</mo></mrow></msubsup></mtd></mtr><mtr><mtd><msup><mi>𝑎</mi><mo form="infix" lspace="0em" rspace="0em">⊆</mo></msup><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow><mo>,</mo><msub><mi>𝑎</mi><mrow><mi>𝜁</mi><mrow><mo>(</mo><mi>𝑥</mi><mo>)</mo></mrow></mrow></msub><mo>,</mo><msub><mi>𝜋</mi><mrow><mn>1</mn><mrow><mo>(</mo><mi>𝑌</mi><mo>)</mo></mrow></mrow></msub><mo>,</mo><msubsup><mi>𝑎</mi><msqrt><mi>𝑐</mi></msqrt><mrow><mo>|</mo><mi>𝑏</mi><mo>|</mo></mrow></msubsup></mtd></mtr></mtable></math></p>
  </body>
</html>
