<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p>We define <math><mi>𝑥</mi></math> in preparation of <a href="#fib">Equation II</a>:</p>
    <math id="ratio" display="block">
      <mi>𝜙</mi>
      <mo>≔</mo>
      <mfrac>
        <mrow>
          <mn>1</mn>
          <mo>+</mo>
          <msqrt>
            <mn>5</mn>
          </msqrt>
        </mrow>
        <mn>2</mn>
      </mfrac>
    </math>
    <p>With <a href="#ratio">Equation I</a>, we get</p>
    <math id="fib" display="block">
      <msub>
        <mi>𝐹</mi>
        <mi>𝑛</mi>
      </msub>
      <mo>=</mo>
      <mrow>
        <mo>⌊</mo>
        <mrow>
          <mfrac>
            <mn>1</mn>
            <msqrt>
              <mn>5</mn>
            </msqrt>
          </mfrac>
          <msup>
            <mi>𝜙</mi>
            <mi>𝑛</mi>
          </msup>
        </mrow>
        <mo>⌉</mo>
      </mrow>
    </math>
  </body>
</html>
