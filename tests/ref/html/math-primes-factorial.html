<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation">
        <mtr>
          <mtd>
            <msup>
              <mrow>
                <msup>
                  <mi>𝑛</mi>
                  <mi>′</mi>
                </msup>
                <mi>!</mi>
              </mrow>
              <mi>′</mi>
            </msup>
            <mspace width="1em"/>
            <msup>
              <mi>𝑛</mi>
              <mi>′</mi>
            </msup>
            <msup>
              <mi>!</mi>
              <mi>′</mi>
            </msup>
            <mspace width="1em"/>
            <msubsup>
              <mi>𝑎</mi>
              <msup>
                <mrow>
                  <msup>
                    <mi>𝑛</mi>
                    <mi>′</mi>
                  </msup>
                  <mi>!</mi>
                </mrow>
                <mi>′</mi>
              </msup>
              <mi>𝑏</mi>
            </msubsup>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <msup>
              <mrow>
                <mi>𝑛</mi>
                <mi>!</mi>
              </mrow>
              <mi>′</mi>
            </msup>
            <mi>!</mi>
            <mspace width="1em"/>
            <mi>𝑛</mi>
            <mi>!</mi>
            <mi>′</mi>
            <mi>!</mi>
            <mspace width="1em"/>
            <msubsup>
              <mi>𝑎</mi>
              <mrow>
                <msup>
                  <mrow>
                    <mi>𝑛</mi>
                    <mi>!</mi>
                  </mrow>
                  <mi>′</mi>
                </msup>
                <mi>!</mi>
              </mrow>
              <mi>𝑏</mi>
            </msubsup>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
