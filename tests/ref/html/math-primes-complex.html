<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <p><math><msubsup><mi>𝑎</mi><mi>𝑏</mi><mrow><mi>′</mi><mi>𝑐</mi></mrow></msubsup></math>, <math><msubsup><mi>𝑎</mi><msup><mi>𝑏</mi><mi>′</mi></msup><mi>𝑐</mi></msubsup></math>, <math><msubsup><mi>𝑎</mi><mi>𝑏</mi><msup><mi>𝑐</mi><mi>′</mi></msup></msubsup></math>, <math><msubsup><mi>𝑎</mi><msup><mi>𝑏</mi><mi>′</mi></msup><msup><mi>𝑐</mi><mrow><mi>′</mi><msup><mi>𝑑</mi><mi>′</mi></msup></mrow></msup></msubsup></math></p>
    <p><math><msup><mrow><mo>(</mo><msubsup><mi>𝑎</mi><msup><mi>𝑏</mi><mi>′</mi></msup><mi>′</mi></msubsup><mo>)</mo></mrow><msubsup><mi>𝑐</mi><msup><mi>𝑑</mi><mi>′</mi></msup><mi>′</mi></msubsup></msup></math>, <math><mfrac><msup><mi>𝑎</mi><mi>′</mi></msup><msup><mi>𝑏</mi><mi>′</mi></msup></mfrac></math>, <math><mfrac><msub><mi>𝑎</mi><msup><mi>𝑏</mi><mi>′</mi></msup></msub><msub><mi>𝑐</mi><msup><mi>𝑑</mi><mi>′</mi></msup></msub></mfrac></math></p>
    <p><math><msup><mo form="prefix" lspace="0em" rspace="0em">∫</mo><mi>′</mi></msup></math>, <math><msup><mo form="prefix" lspace="0em" rspace="0em">∑</mo><mi>′</mi></msup></math>, <math><msup><mi>𝑎</mi><mrow><mi>′</mi><msup><mn>2</mn><mn>2</mn></msup></mrow></msup></math>, <math><msubsup><mi>𝑎</mi><msub><mn>2</mn><mn>2</mn></msub><mi>′</mi></msubsup></math></p>
    <p><math><msubsup><mi>𝑓</mi><msup><mi>𝑛</mi><mi>′</mi></msup><msup><mi>𝑎</mi><mi>′</mi></msup></msubsup></math>, <math><msubsup><mi>𝑓</mi><msup><mi>𝑛</mi><mi>′</mi></msup><msup><mi>𝑎</mi><mi>′</mi></msup></msubsup></math></p>
    <math display="block">
      <munder>
        <msup>
          <mo form="prefix" lspace="0em" rspace="0em">∑</mo>
          <mi>′</mi>
        </msup>
        <msup>
          <mi>𝑆</mi>
          <mi>′</mi>
        </msup>
      </munder>
    </math>
  </body>
</html>
