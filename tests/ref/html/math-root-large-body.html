<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <msqrt>
        <msup>
          <mrow>
            <mo>⟦</mo>
            <mi>𝑥</mi>
            <mo>⟧</mo>
          </mrow>
          <mn>2</mn>
        </msup>
        <mo>+</mo>
        <msup>
          <mrow>
            <mo>⟦</mo>
            <mi>𝑦</mi>
            <mo>⟧</mo>
          </mrow>
          <mn>2</mn>
        </msup>
      </msqrt>
      <mo>&lt;</mo>
      <mrow>
        <mo>⟦</mo>
        <mi>𝑧</mi>
        <mo>⟧</mo>
      </mrow>
    </math>
    <math display="block">
      <mi>𝑣</mi>
      <mo>=</mo>
      <msqrt>
        <mfrac>
          <mfrac>
            <mn>1</mn>
            <mn>2</mn>
          </mfrac>
          <mfrac>
            <mn>4</mn>
            <mn>5</mn>
          </mfrac>
        </mfrac>
      </msqrt>
      <mo>=</mo>
      <mroot>
        <mfrac>
          <mfrac>
            <mfrac>
              <mn>1</mn>
              <mn>2</mn>
            </mfrac>
            <mn>3</mn>
          </mfrac>
          <mfrac>
            <mfrac>
              <mn>4</mn>
              <mn>5</mn>
            </mfrac>
            <mn>6</mn>
          </mfrac>
        </mfrac>
        <mn>3</mn>
      </mroot>
      <mo>=</mo>
      <mroot>
        <mfrac>
          <mfrac>
            <mfrac>
              <mn>1</mn>
              <mn>2</mn>
            </mfrac>
            <mfrac>
              <mn>3</mn>
              <mn>4</mn>
            </mfrac>
          </mfrac>
          <mfrac>
            <mfrac>
              <mn>1</mn>
              <mn>2</mn>
            </mfrac>
            <mfrac>
              <mn>3</mn>
              <mn>4</mn>
            </mfrac>
          </mfrac>
        </mfrac>
        <mn>4</mn>
      </mroot>
    </math>
    <math display="block">
      <mi>𝑣</mi>
      <mo>=</mo>
      <msqrt>
        <mtable class="multiline-equation">
          <mtr>
            <mtd>
              <mi>𝑎</mi>
              <mo form="infix" rspace="0em">+</mo>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>𝑏</mi>
            </mtd>
          </mtr>
        </mtable>
      </msqrt>
    </math>
  </body>
</html>
