<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mi>𝑓</mi>
      <mo>≔</mo>
      <mrow>
        <mo>{</mo>
        <mtable>
          <mtr>
            <mtd>
              <mn>1</mn>
              <mo>+</mo>
              <mn>2</mn>
              <mspace width="0.2222222222222222em"/>
            </mtd>
            <mtd>
              <mtext>iff</mtext>
              <mspace width="0.2222222222222222em"/>
            </mtd>
            <mtd>
              <mi>𝑥</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mn>3</mn>
              <mspace width="0.2222222222222222em"/>
            </mtd>
            <mtd>
              <mtext>if</mtext>
              <mspace width="0.2222222222222222em"/>
            </mtd>
            <mtd>
              <mi>𝑦</mi>
            </mtd>
          </mtr>
        </mtable>
      </mrow>
    </math>
  </body>
</html>
