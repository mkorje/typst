<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mtable class="multiline-equation">
        <mtr>
          <mtd>
            <mfrac>
              <msqrt>
                <mi>𝑎</mi>
              </msqrt>
              <mi>𝑏</mi>
            </mfrac>
            <mroot>
              <msub>
                <mi>𝑎</mi>
                <mi>𝑏</mi>
              </msub>
              <mn>3</mn>
            </mroot>
            <mroot>
              <msup>
                <mi>𝑓</mi>
                <mi>′</mi>
              </msup>
              <mn>4</mn>
            </mroot>
            <msqrt>
              <mi>𝑛</mi>
              <mi>!</mi>
            </msqrt>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <msqrt>
              <mi>𝑎</mi>
            </msqrt>
            <msup>
              <mi>𝑏</mi>
              <mi>𝑐</mi>
            </msup>
            <msqrt>
              <mi>𝑎</mi>
            </msqrt>
            <msup>
              <mrow>
                <mo>(</mo>
                <mi>𝑏</mi>
                <mo>)</mo>
              </mrow>
              <mi>𝑐</mi>
            </msup>
            <msqrt>
              <msup>
                <mrow>
                  <mi>𝑎</mi>
                  <mrow>
                    <mo>(</mo>
                    <mi>𝑏</mi>
                    <mo>)</mo>
                  </mrow>
                </mrow>
                <mi>𝑐</mi>
              </msup>
            </msqrt>
          </mtd>
        </mtr>
      </mtable>
    </math>
  </body>
</html>
