<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <munder>
        <mo lspace="0em">∑</mo>
        <mtable class="multiline-equation">
          <mtr>
            <mtd>
              <mi>𝑛</mi>
              <mo lspace="0em" rspace="0em">∈</mo>
              <mi>ℕ</mi>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mi>𝑛</mi>
              <mo lspace="0em" rspace="0em">≤</mo>
              <mn>5</mn>
            </mtd>
          </mtr>
        </mtable>
      </munder>
      <mi>𝑛</mi>
      <mo>=</mo>
      <mfrac>
        <mrow>
          <mn>5</mn>
          <mrow>
            <mo>(</mo>
            <mrow>
              <mn>5</mn>
              <mo>+</mo>
              <mn>1</mn>
            </mrow>
            <mo>)</mo>
          </mrow>
        </mrow>
        <mn>2</mn>
      </mfrac>
      <mo>=</mo>
      <mn>15</mn>
    </math>
  </body>
</html>
