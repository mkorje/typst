<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mi>𝑆</mi>
      <mo>=</mo>
      <mover>
        <mover accent="true">
          <mrow>
            <mi style="math-shift: normal">𝛽</mi>
            <mrow style="math-shift: normal">
              <mo>(</mo>
              <mi>𝛼</mi>
              <mo>)</mo>
            </mrow>
            <mi style="math-shift: normal">𝑆</mi>
            <mi style="math-shift: normal">𝐼</mi>
          </mrow>
          <mo>⏞</mo>
        </mover>
        <mtext>one line</mtext>
      </mover>
      <mo>−</mo>
      <mover>
        <mover accent="true">
          <mrow>
            <mi style="math-shift: normal">𝜇</mi>
            <mrow style="math-shift: normal">
              <mo>(</mo>
              <mi>𝑁</mi>
              <mo>)</mo>
            </mrow>
          </mrow>
          <mo>⏞</mo>
        </mover>
        <mtable class="multiline-equation">
          <mtr>
            <mtd>
              <mtext>two</mtext>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mtext>line</mtext>
            </mtd>
          </mtr>
        </mtable>
      </mover>
    </math>
    <math display="block">
      <mi>𝑆</mi>
      <mo>=</mo>
      <munder>
        <munder accentunder="true">
          <mrow>
            <mi>𝛽</mi>
            <mrow>
              <mo>(</mo>
              <mi>𝛼</mi>
              <mo>)</mo>
            </mrow>
            <mi>𝑆</mi>
            <mi>𝐼</mi>
          </mrow>
          <mo>⏟</mo>
        </munder>
        <mtext>one line</mtext>
      </munder>
      <mo>−</mo>
      <munder>
        <munder accentunder="true">
          <mrow>
            <mi>𝜇</mi>
            <mrow>
              <mo>(</mo>
              <mi>𝑁</mi>
              <mo>)</mo>
            </mrow>
          </mrow>
          <mo>⏟</mo>
        </munder>
        <mtable class="multiline-equation">
          <mtr>
            <mtd>
              <mtext>two</mtext>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mtext>line</mtext>
            </mtd>
          </mtr>
        </mtable>
      </munder>
    </math>
  </body>
</html>
