<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      /* Tables */
      mtable {
        math-style: inherit;
      }
      mtd {
        math-depth: auto-add;
        math-style: compact;
        math-shift: compact;
      }
      
      /* Equations */
      mtable.multiline-equation mtd {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
        padding: 0;
      }
      mtable.multiline-equation mtr:not(:last-child) mtd {
        padding-bottom: 0;
      }
      math:is(:not([display])) > mtable.multiline-equation mtd,
      mtable.multiline-equation.aligned-equation mtd:nth-child(even) {
        text-align: -webkit-left;
      }
      mtable.multiline-equation.aligned-equation mtd:nth-child(odd) {
        text-align: -webkit-right;
      }
      
      /* Fractions */
      mfrac {
        padding-inline: 0;
        margin-inline: 0.1em;
      }
      
      /* Other rules for scriptlevel, displaystyle and math-shift */
      munder > :nth-child(2),
      munderover > :nth-child(2) {
        math-shift: compact
      }
      munder[accentunder="true" i] > :not(:first-child),
      mover[accent="true" i] > :not(:first-child) {
        math-depth: inherit;
        math-style: inherit;
        math-shift: inherit;
      }
    </style>
  </head>
  <body>
    <math display="block">
      <mi>𝑎</mi>
      <mover>
        <mo>=</mo>
        <mtext>def</mtext>
      </mover>
      <mi>𝑏</mi>
      <mspace width="1em"/>
      <mi>𝑎</mi>
      <munder>
        <mo>≤</mo>
        <mtext>really</mtext>
      </munder>
      <mi>𝑏</mi>
      <mspace width="1em"/>
      <mi>𝑎</mi>
      <mover>
        <mo stretchy="false">⟿</mo>
        <mtext>slowly</mtext>
      </mover>
      <mi>𝑏</mi>
    </math>
    <p><math><mi>𝑎</mi><mover><mo>=</mo><mtext>def</mtext></mover><mi>𝑏</mi><mspace width="1em"/><mi>𝑎</mi><munder><mo>≤</mo><mtext>really</mtext></munder><mi>𝑏</mi><mspace width="1em"/><mi>𝑎</mi><mover><mo stretchy="false">⟿</mo><mtext>slowly</mtext></mover><mi>𝑏</mi></math></p>
    <p><math><mi>𝑎</mi><msup><mo>=</mo><mtext>def</mtext></msup><mi>𝑏</mi><mspace width="1em"/><mi>𝑎</mi><msub><mo>≤</mo><mtext>really</mtext></msub><mi>𝑏</mi><mspace width="1em"/><mi>𝑎</mi><msup><mo stretchy="false">⟿</mo><mtext>slowly</mtext></msup><mi>𝑏</mi></math></p>
  </body>
</html>
